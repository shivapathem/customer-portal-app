name: Customer Portal Hybrid CI/CD Pipeline
 
on:
  push:
    branches:
      - dev
      - main
 
jobs:
 
  # -----------------------------------
  # 1. BUILD (GitHub Hosted Runner)
  # -----------------------------------
  build:
    name: Build Application
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Validate PHP Syntax
        run: |
          find src -name "*.php" -exec php -l {} \;
 
      - name: Build Completed
        run: echo "Build successful"
 
 
  # -----------------------------------
  # 2. DATABASE DEPLOY (Self-Hosted Windows)
  # -----------------------------------
  deploy-db:
    name: Deploy Database Changes
    runs-on: self-hosted
    needs: build
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Run SQL Script with Debug
        shell: cmd
        run: |
          echo ===== START SQL EXECUTION =====
 
          sqlcmd -S %DB_SERVER% ^
                 -d %DB_NAME% ^
                 -U %DB_USER% ^
                 -P %DB_PASSWORD% ^
                 -i database\insert_data.sql ^
                 -o output.txt
 
          echo ===== SQL OUTPUT =====
          type output.txt
 
          echo ===== END SQL EXECUTION =====
 
        env:
          DB_SERVER: ${{ secrets.DB_SERVER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
 
 
  # -----------------------------------
  # 3. VERIFY DATA (Self-Hosted)
  # -----------------------------------
  verify-db:
    name: Verify Database Changes
    runs-on: self-hosted
    needs: deploy-db
 
    steps:
      - name: Verify Row Count
        shell: cmd
        run: |
          echo ===== VERIFY DATA =====
 
          sqlcmd -S %DB_SERVER% ^
                 -d %DB_NAME% ^
                 -U %DB_USER% ^
                 -P %DB_PASSWORD% ^
                 -Q "SELECT COUNT(*) AS TotalRows FROM [dbo].[DevOps_1]"
 
        env:
          DB_SERVER: ${{ secrets.DB_SERVER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
 
 
  # -----------------------------------
  # 4. ROLLBACK (ONLY IF FAILURE)
  # -----------------------------------
  rollback:
    name: Rollback on Failure
    runs-on: self-hosted
    needs: deploy-db
    if: failure()
 
    steps:
      - name: Run Rollback Script
        shell: cmd
        run: |
          echo ===== ROLLBACK STARTED =====
 
          sqlcmd -S %DB_SERVER% ^
                 -d %DB_NAME% ^
                 -U %DB_USER% ^
                 -P %DB_PASSWORD% ^
                 -i database\rollback.sql
 
          echo ===== ROLLBACK COMPLETED =====
 
        env:
          DB_SERVER: ${{ secrets.DB_SERVER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
